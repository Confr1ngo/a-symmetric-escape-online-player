<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Symmetric Escape Online Player</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --bg: #f6f4ee;
      --panel: #fffdf8;
      --line: #cbc4b8;
      --line-strong: #8f8778;
      --text: #2f2a21;
      --muted: #6d6658;
      --good: #21824d;
      --bad: #b33a3a;
      --accent: #6d7c59;
      --board: #fffdfa;
      --hole: #111111;
      --empty: #ebe5d8;
      --shadow: 0 8px 22px rgba(64, 52, 30, 0.08);
      --cell-size: clamp(28px, 5.2vw, 46px);
      --clue-box-size: clamp(24px, 3.7vw, 32px);
      --clue-font-size: clamp(11px, 1.8vw, 13px);
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.4), rgba(255,255,255,0)),
        linear-gradient(135deg, #f4efe3, #f8f6f0 42%, #ece8dc);
      color: var(--text);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      color: inherit;
    }

    .app {
      max-width: 1480px;
      margin: 0 auto;
      padding: 20px 16px 28px;
    }

    .header {
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(26px, 4vw, 38px);
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.72);
      font-size: 13px;
      line-height: 1.2;
    }

    .legend-symbol {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      color: #4f5e44;
    }

    .legend-symbol svg,
    .clue-icon svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .layout {
      display: block;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin: 14px 0 16px;
      border-bottom: 1px solid rgba(143, 135, 120, 0.45);
    }

    .tab-btn {
      min-width: 112px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-bottom: 0;
      background: #f4efe3;
      color: var(--muted);
      font-weight: 700;
    }

    .tab-btn.active {
      background: var(--panel);
      color: var(--text);
      border-color: var(--line-strong);
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(143, 135, 120, 0.35);
      box-shadow: var(--shadow);
      padding: 16px;
      border-radius: 8px;
    }

    .panel:not(.active) {
      display: none;
    }

    .panel h2,
    .panel h3 {
      margin: 0 0 12px;
    }

    .panel h2 {
      font-size: 22px;
    }

    .panel h3 {
      font-size: 16px;
    }

    .section {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(143, 135, 120, 0.22);
    }

    .row,
    .toolbar,
    .button-row,
    .tiny-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .toolbar {
      margin-bottom: 10px;
    }

    .stack {
      display: grid;
      gap: 10px;
    }

    label {
      font-size: 14px;
      color: var(--muted);
    }

    .field {
      display: grid;
      gap: 4px;
      min-width: 0;
      flex: 1 1 140px;
    }

    .field.narrow {
      flex: 0 0 96px;
    }

    .field.wide {
      flex: 4 1 360px;
    }

    .field.hidden {
      display: none;
    }

    .hidden {
      display: none !important;
    }

    input[type="text"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--line);
      background: #fffefb;
    }

    textarea {
      min-height: 136px;
      resize: vertical;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      line-height: 1.45;
    }

    button {
      padding: 8px 12px;
      border: 1px solid var(--line-strong);
      background: #f6f2e7;
      cursor: pointer;
    }

    button:hover {
      background: #efe7d5;
    }

    button.primary {
      background: #dde4cf;
      border-color: #7b8768;
    }

    button.primary:hover {
      background: #d0dabd;
    }

    button.danger {
      background: #f0dddd;
      border-color: #ab6a6a;
    }

    button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .status {
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: #fbf9f2;
      line-height: 1.55;
      min-height: 46px;
    }

    .status.good {
      border-color: rgba(33, 130, 77, 0.35);
      background: rgba(33, 130, 77, 0.1);
      color: var(--good);
      font-weight: 600;
    }

    .board-wrap {
      display: inline-block;
      border: 2px solid var(--line-strong);
      background: var(--board);
      padding: 0;
      overflow: auto;
      max-width: 100%;
    }

    .board {
      display: grid;
      gap: 0;
      user-select: none;
      position: relative;
    }

    .cell {
      width: var(--cell-size);
      height: var(--cell-size);
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, filter 0.08s ease;
      background: var(--empty);
    }

    .cell:hover {
      filter: brightness(0.97);
    }

    .cell:first-child {
      border-left: 0;
      border-top: 0;
    }

    .cell.hole {
      background: var(--hole);
      color: white;
      cursor: default;
    }

    .cell.selected-editor {
      outline: 2px solid #444;
      outline-offset: -2px;
    }

    .clue {
      position: relative;
      display: inline-block;
      width: var(--clue-box-size);
      height: var(--clue-box-size);
      line-height: 1;
      text-shadow: 0 1px 0 rgba(255,255,255,0.42);
      pointer-events: none;
      white-space: nowrap;
      background: rgba(255, 252, 245, 0.96);
      border: 1px solid rgba(120, 111, 95, 0.72);
      color: #2c2418;
    }

    .clue-number {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--clue-font-size);
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums lining-nums;
      font-feature-settings: "tnum" 1, "lnum" 1;
      z-index: 1;
    }

    .cell > .clue {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    .clue-icon {
      width: 100%;
      height: 100%;
      display: block;
    }

    .clue-floating {
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 4;
      padding: 0;
      pointer-events: none;
    }

    .anchor-hit {
      position: absolute;
      z-index: 3;
      border: 0;
      background: transparent;
      padding: 0;
      margin: 0;
      cursor: pointer;
    }

    .anchor-hit.edge-h {
      width: calc(var(--cell-size) * 0.58);
      height: 12px;
      transform: translate(-50%, -50%);
    }

    .anchor-hit.edge-v {
      width: 12px;
      height: calc(var(--cell-size) * 0.58);
      transform: translate(-50%, -50%);
    }

    .anchor-hit.vertex {
      width: 14px;
      height: 14px;
      transform: translate(-50%, -50%);
    }

    .anchor-hit:hover {
      background: rgba(109, 124, 89, 0.08);
    }

    .cell.hole .clue {
      text-shadow: none;
    }

    .board .cell[data-top="1"] {
      border-top: 0;
    }

    .board .cell[data-left="1"] {
      border-left: 0;
    }

    .palette {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .swatch {
      width: 26px;
      height: 26px;
      border: 1px solid rgba(32, 32, 32, 0.35);
    }

    .level-list {
      display: grid;
      gap: 10px;
    }

    .level-section {
      display: grid;
      grid-template-columns: minmax(76px, auto) 1fr;
      gap: 8px;
      align-items: start;
    }

    .level-section-name {
      color: var(--muted);
      font-size: 13px;
      line-height: 32px;
      overflow-wrap: anywhere;
    }

    .level-section-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .level-chip {
      min-width: 42px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      background: #fbf8f0;
      text-align: center;
      cursor: pointer;
    }

    .level-chip.active {
      background: #dde4cf;
      border-color: #778661;
    }

    .level-chip.locked {
      opacity: 0.55;
      cursor: default;
    }

    .level-chip.solved {
      border-color: #5f8d66;
      background: #e1f0e4;
    }

    .listbox {
      display: grid;
      gap: 6px;
      max-height: 240px;
      overflow: auto;
      padding-right: 4px;
    }

    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      background: #fcfaf4;
      cursor: pointer;
    }

    .list-item.active {
      background: #e7eddb;
      border-color: #7a8965;
    }

    .clue-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }

    .clue-picker-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 54px;
      padding: 7px 9px;
      border: 1px solid var(--line);
      background: #fcfaf4;
      cursor: pointer;
    }

    .clue-picker-btn.active {
      background: #dde4cf;
      border-color: #778661;
      color: #2d3a1f;
    }

    .clue-picker-btn .legend-symbol,
    .clue-picker-btn .clue-icon {
      width: 16px;
      height: 16px;
      color: currentColor;
    }

    .clue-picker-text {
      font-size: 12px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .note {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .file-input {
      max-width: 100%;
    }

    @media (max-width: 1080px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .app {
        padding: 14px 10px 24px;
      }

      .panel {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>A Symmetric Escape Online Player</h1>
      <p class="subtitle">离线单文件游玩器与编辑器。支持单题、题集、镂空格、实时判题、题集解锁、紧凑导入导出。</p>
      <div id="legend" class="legend"></div>
    </header>

    <nav class="tabs" aria-label="主视图">
      <button id="playerTabBtn" class="tab-btn active" type="button">Player</button>
      <button id="setterTabBtn" class="tab-btn" type="button">Setter</button>
    </nav>

    <main class="layout">
      <section id="playerPanel" class="panel active">
        <h2>Player</h2>
        <div id="playMeta" class="meta"></div>
        <div class="section">
          <div id="playNavigator" class="stack"></div>
        </div>
        <div class="section stack">
          <div id="playStatus" class="status"></div>
          <div class="button-row">
            <button id="prevLevelBtn">上一题</button>
            <button id="nextLevelBtn">下一题</button>
            <button id="resetLevelBtn">清空当前题</button>
          </div>
          <div id="playBoardWrap" class="board-wrap"></div>
          <div class="meta">操作说明：左键循环换色，右键反向换色。从任意格子按住左键拖拽，可把起点格当前状态刷到经过的其他格子；如果起点未涂色，就会沿路擦成未涂色。镂空格为纯黑，不参与任何连通块。</div>
          <div id="playPalette" class="palette"></div>
        </div>

        <div class="section">
          <h3>导入到游玩区</h3>
          <div class="stack">
            <textarea id="importText" placeholder="把导出的存档文本粘贴到这里"></textarea>
            <div class="button-row">
              <button id="importToPlayBtn" class="primary">导入到游玩区</button>
              <button id="importToEditorBtn">导入到编辑区</button>
              <input id="importFileInput" class="file-input" type="file" accept=".json,.txt,.ase">
            </div>
            <div id="importStatus" class="note"></div>
          </div>
        </div>
      </section>

      <section id="setterPanel" class="panel">
        <h2>Setter</h2>
        <div class="toolbar">
          <button id="newSingleBtn" class="primary">新建单题</button>
          <button id="newCollectionBtn">新建题集</button>
          <button id="copyPlayToEditorBtn">从游玩区复制</button>
          <button id="loadSampleBtn">载入示例</button>
          <button id="pushEditorToPlayBtn">发送到游玩区</button>
        </div>
        <div id="editorModeMeta" class="meta"></div>

        <div class="section stack">
          <div class="row">
            <div class="field">
              <label for="editorNameInput">名称</label>
              <input id="editorNameInput" type="text" placeholder="关卡或题集名称">
            </div>
            <div id="collectionModeField" class="field">
              <label for="collectionModeSelect">题集解锁方式</label>
              <select id="collectionModeSelect">
                <option value="all">完全解锁</option>
                <option value="progressive">顺序解锁</option>
                <option value="dependency">依赖模式</option>
              </select>
            </div>
            <div id="visibleCountField" class="field">
              <label for="visibleCountInput">顺序解锁初始可见题数</label>
              <input id="visibleCountInput" type="number" min="1" max="99" value="2">
            </div>
          </div>
          <div id="editorCollectionTools" class="stack">
            <div class="button-row">
              <button id="addLevelBtn" class="primary">新增关卡</button>
              <button id="duplicateLevelBtn">复制当前关卡</button>
              <button id="moveLevelUpBtn">上移</button>
              <button id="moveLevelDownBtn">下移</button>
              <button id="deleteLevelBtn" class="danger">删除当前关卡</button>
            </div>
            <div id="editorLevelList" class="listbox"></div>
          </div>
        </div>

        <div class="section stack">
          <h3>当前关卡设置</h3>
          <div class="row">
            <div class="field">
              <label for="levelNameInput">关卡名</label>
              <input id="levelNameInput" type="text" placeholder="例如：入门 1">
            </div>
            <div class="field">
              <label for="sectionNameInput">区域名</label>
              <input id="sectionNameInput" type="text" placeholder="例如：第一章">
            </div>
            <div class="field">
              <label for="rowsInput">行数</label>
              <input id="rowsInput" type="number" min="1" max="30" value="5">
            </div>
            <div class="field">
              <label for="colsInput">列数</label>
              <input id="colsInput" type="number" min="1" max="30" value="5">
            </div>
            <div class="field">
              <label for="colorsInput">可用颜色数</label>
              <input id="colorsInput" type="number" min="1" max="4" value="2">
            </div>
          </div>
          <div class="row">
            <label><input id="singleClueCheckbox" type="checkbox" checked> 每个同色连通块最多允许一个提示数</label>
          </div>
          <div class="row">
            <label><input id="wrapRowsCheckbox" type="checkbox"> 左右连通</label>
            <label><input id="wrapColsCheckbox" type="checkbox"> 上下连通</label>
          </div>
          <div id="dependencyFields" class="row">
            <div class="field">
              <label for="dependencyInput">依赖题号</label>
              <input id="dependencyInput" type="text" placeholder="例如：1,3,5">
            </div>
            <div class="field">
              <label for="dependencyModeSelect">依赖判定</label>
              <select id="dependencyModeSelect">
                <option value="any">任意</option>
                <option value="all">全部</option>
              </select>
            </div>
          </div>
          <div class="row">
            <div class="field narrow">
              <label for="clueNumberInput">提示数字</label>
              <input id="clueNumberInput" type="number" min="0" max="999" value="4">
            </div>
            <div class="field wide">
              <label>提示图标</label>
              <div id="cluePicker" class="clue-picker"></div>
            </div>
          </div>
          <div id="editorBoardWrap" class="board-wrap"></div>
          <div class="note">编辑说明：图标面板就是当前编辑模式。选纯黑后，点格子可设置或取消镂空；选其他图标后，可点格心、内部棱或内部顶点放置或替换 clue；若该位置已经是同一条 clue，再点一次会删除。</div>
        </div>

        <div class="section stack">
          <h3>导出</h3>
          <textarea id="exportText" placeholder="导出的存档会显示在这里"></textarea>
          <div class="button-row">
            <button id="refreshExportBtn" class="primary">生成导出文本</button>
            <button id="copyExportBtn">复制导出文本</button>
            <button id="downloadExportBtn">下载存档文件</button>
          </div>
          <div id="exportStatus" class="note"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    (() => {
      const STORAGE_KEYS = {
        playData: "ase_play_data_v1",
        playProgress: "ase_play_progress_v1",
        editorData: "ase_editor_data_v1"
      };

      const COLOR_POOL = [
        "#8c58c9",
        "#e1c33a",
        "#5fa35c",
        "#cf4f47"
      ];

      const ICON_SVG = {
        N: '<svg viewBox="0 0 16 16" aria-hidden="true"><rect x="4" y="4" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>',
        X: '<svg viewBox="0 0 16 16" aria-hidden="true"><rect x="1.8" y="1.8" width="12.4" height="12.4" rx="1.5" fill="currentColor" stroke="currentColor" stroke-width="1.2"/></svg>',
        H: '<svg viewBox="0 0 16 16" aria-hidden="true"><rect x="4" y="4" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M1.6 8H4M12 8h2.4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg>',
        V: '<svg viewBox="0 0 16 16" aria-hidden="true"><rect x="4" y="4" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M8 1.6V4M8 12v2.4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg>',
        B: '<svg viewBox="0 0 16 16" aria-hidden="true"><rect x="4" y="4" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M1.6 8H4M12 8h2.4M8 1.6V4M8 12v2.4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg>',
        D1: '<svg viewBox="0 0 16 16" aria-hidden="true"><rect x="4" y="4" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M2 2l2.3 2.3M11.7 11.7L14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg>',
        D2: '<svg viewBox="0 0 16 16" aria-hidden="true"><rect x="4" y="4" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M2 14l2.3-2.3M11.7 4.3L14 2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg>',
        C: '<svg viewBox="0 0 16 16" aria-hidden="true"><rect x="4" y="4" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M1.6 8H4M12 8h2.4M1.6 8V4M14.4 8v4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"/></svg>',
        R: '<svg viewBox="0 0 16 16" aria-hidden="true"><rect x="4" y="4" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M8 1.6V4M8 1.6h3.8M14.4 8H12M14.4 8v3.8M8 14.4V12M8 14.4H4.2M1.6 8H4M1.6 8V4.2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"/></svg>'
      };

      const CLUE_POSITIONS = ["C", "H", "V", "X"];
      const CLUE_POSITION_NAMES = {
        C: "格心",
        H: "横棱",
        V: "竖棱",
        X: "顶点"
      };
      const SYMMETRY_META = {
        "": { name: "无额外对称限制", legend: "纯数字：只限制连通块大小" },
        H: { name: "水平对称", legend: "水平对称" },
        V: { name: "竖直对称", legend: "竖直对称" },

          }

          writeString(bytes, data.name);
          bytes.push(data.unlockMode === "all" ? 0 : data.unlockMode === "dependency" ? 2 : 1, data.visibleCount & 255);
          writeU16(bytes, data.levels.length);
          data.levels.forEach((level) => encodeLevelBinary(bytes, level));
        }
        return new Uint8Array(bytes);
      }

      function decodeDataBinary(bytes) {
        if (bytes.length < 6) {
          throw new Error("存档过短。");
        }
        if (String.fromCharCode(bytes[0], bytes[1], bytes[2], bytes[3]) !== "ASEB") {
          throw new Error("存档头不正确。");
        }
        const version = bytes[4];
        if (version === 1) {
          return decodeDataBinaryV1(bytes);
        }
        if (version !== 2 && version !== 3 && version !== 4) {
          throw new Error("不支持的存档版本。");
        }
        const kind = bytes[5];
        const cursor = { value: 6 };
        if (kind === 0) {
          return makeSingle(decodeLevelBinary(bytes, cursor, version));
        }
        if (kind === 1) {
          const name = readString(bytes, cursor);
          if (cursor.value + 4 > bytes.length) throw new Error("题集头读取越界。");
          const unlockMode = bytes[cursor.value] === 0 ? "all" : bytes[cursor.value] === 2 ? "dependency" : "progressive";
          const visibleCount = bytes[cursor.value + 1];
          const levelCount = readU16(bytes, cursor.value + 2);
          cursor.value += 4;
          const levels = [];
          for (let i = 0; i < levelCount; i += 1) {
            levels.push(decodeLevelBinary(bytes, cursor, version, i, levelCount));
          }
          return normalizeData({ kind: "collection", name, unlockMode, visibleCount, levels });
        }
        throw new Error("无法识别的二进制存档类型。");
      }

      function decodeDataBinaryV1(bytes) {
        const kind = bytes[5];
        const cursor = { value: 6 };
        function decodeLevelV1() {
          const name = readString(bytes, cursor);
          if (cursor.value + 4 > bytes.length) throw new Error("旧版关卡头读取越界。");
          const rows = bytes[cursor.value];
          const cols = bytes[cursor.value + 1];
          const colors = bytes[cursor.value + 2];
          const singleClue = bytes[cursor.value + 3] === 1;
          cursor.value += 4;
          const holes = decodeHoles(bytes, cursor, rows * cols);
          const clueCount = readU16(bytes, cursor.value);
          cursor.value += 2;
          const clues = [];
          for (let i = 0; i < clueCount; i += 1) {
            if (cursor.value + 5 > bytes.length) throw new Error("旧版提示数据读取越界。");
            const r = bytes[cursor.value];
            const c = bytes[cursor.value + 1];
            const n = readU16(bytes, cursor.value + 2);
            const s = SYMMETRY_ORDER[bytes[cursor.value + 4]] ?? "";
            cursor.value += 5;
            clues.push({ p: "C", r, c, n, s });
          }
          return normalizeLevel({ name, rows, cols, colors, singleClue, holes, clues });
        }
        if (kind === 0) {
          return makeSingle(decodeLevelV1());
        }
        if (kind === 1) {
          const name = readString(bytes, cursor);
          if (cursor.value + 4 > bytes.length) throw new Error("旧版题集头读取越界。");
          const unlockMode = bytes[cursor.value] === 0 ? "all" : "progressive";
          const visibleCount = bytes[cursor.value + 1];
          const levelCount = readU16(bytes, cursor.value + 2);
          cursor.value += 4;
          const levels = [];
          for (let i = 0; i < levelCount; i += 1) levels.push(decodeLevelV1());
          return normalizeData({ kind: "collection", name, unlockMode, visibleCount, levels });
        }
        throw new Error("无法识别的旧版二进制存档类型。");
      }

      function exportDataText(data) {
        return COMPRESSED_PREFIX + bytesToBase64(compressBytes(encodeDataBinary(data)));
      }

      function parseDataText(text) {
        const trimmed = text.trim();
        if (!trimmed) {
          throw new Error("没有可导入的文本。");
        }
        if (trimmed.startsWith("{") || trimmed.startsWith("[")) {
          try {
            return normalizeData(JSON.parse(trimmed));
          } catch {
            throw new Error("导入失败：旧版 JSON 存档解析失败。");
          }
        }
        try {
          if (trimmed.startsWith(COMPRESSED_PREFIX)) {
            const payload = trimmed.slice(COMPRESSED_PREFIX.length);
            return decodeDataBinary(decompressBytes(base64ToBytes(payload)));
          }
          const matchedPrefix = [BINARY_PREFIX, ...LEGACY_BINARY_PREFIXES].find((prefix) => trimmed.startsWith(prefix));
          const payload = matchedPrefix ? trimmed.slice(matchedPrefix.length) : trimmed;
          const bytes = base64ToBytes(payload);
          try {
            return decodeDataBinary(decompressBytes(bytes));
          } catch {
            return decodeDataBinary(bytes);
          }
        } catch {
          throw new Error("导入失败：请确认文本是本工具导出的 Base64 压缩存档或旧版二进制存档。");
        }
      }

      function clampInt(value, min, max, fallback) {
        const num = Number.parseInt(value, 10);
        if (!Number.isFinite(num)) return fallback;
        return Math.max(min, Math.min(max, num));
      }

      function normalizeSymmetry(value) {
        return ["", "H", "V", "B", "D1", "D2", "C", "R"].includes(value) ? value : "";
      }

      function normalizeCluePosition(value) {
        return CLUE_POSITIONS.includes(value) ? value : "C";
      }

      function indexKey(r, c) {
        return r + "," + c;
      }

      function clueKey(clue) {
        return `${clue.p || "C"}:${clue.r},${clue.c}`;
      }

      function getClueTouchedCells(level, clue) {
        switch (clue.p || "C") {
          case "C":
            return [{ r: clue.r, c: clue.c }];
          case "H":
            return [{ r: clue.r - 1, c: clue.c }, { r: clue.r, c: clue.c }];
          case "V":
            return [{ r: clue.r, c: clue.c - 1 }, { r: clue.r, c: clue.c }];
          case "X":
            return [
              { r: clue.r - 1, c: clue.c - 1 },
              { r: clue.r - 1, c: clue.c },
              { r: clue.r, c: clue.c - 1 },
              { r: clue.r, c: clue.c }
            ];
          default:
            return [];
        }
      }

      function isCellInside(level, r, c) {
        return r >= 0 && r < level.rows && c >= 0 && c < level.cols;
      }

      function isCluePlacementValid(level, clue) {
        const p = clue.p || "C";
        if (!CLUE_POSITIONS.includes(p)) return false;
        if (p === "H" && (clue.r <= 0 || clue.r >= level.rows || clue.c < 0 || clue.c >= level.cols)) return false;
        if (p === "V" && (clue.r < 0 || clue.r >= level.rows || clue.c <= 0 || clue.c >= level.cols)) return false;
        if (p === "X" && (clue.r <= 0 || clue.r >= level.rows || clue.c <= 0 || clue.c >= level.cols)) return false;
        if (p === "C" && !isCellInside(level, clue.r, clue.c)) return false;
        return getClueTouchedCells(level, clue).every((cell) => {
          return isCellInside(level, cell.r, cell.c) && level.holes[cell.r * level.cols + cell.c] !== "#";
        });
      }

      function getLevels(data) {
        return data.kind === "single" ? [data.level] : data.levels;
      }

      function getActiveEditorLevel() {
        const levels = getLevels(state.editorData);
        return levels[state.editorSelection] || levels[0];
      }

      function ensureEditorSelection() {
        const levels = getLevels(state.editorData);
        if (levels.length === 0) {
          if (state.editorData.kind === "single") {
            state.editorData.level = makeLevel();
          } else {
            state.editorData.levels.push(makeLevel("关卡 1"));
          }
        }
        state.editorSelection = Math.max(0, Math.min(state.editorSelection, getLevels(state.editorData).length - 1));
      }

      function makeProgress(data) {
        const levels = getLevels(data);
        return {
          fills: levels.map((level) => Array(level.rows * level.cols).fill(null)),
          solved: Array(levels.length).fill(false)
        };
      }

      function normalizeProgress(data, rawProgress) {
        const clean = makeProgress(data);
        if (!rawProgress || typeof rawProgress !== "object") return clean;
        const levels = getLevels(data);
        levels.forEach((level, idx) => {
          const src = Array.isArray(rawProgress.fills?.[idx]) ? rawProgress.fills[idx] : [];
          clean.fills[idx] = Array(level.rows * level.cols).fill(null).map((_, cellIdx) => {
            if (level.holes[cellIdx] === "#") return null;
            const value = src[cellIdx];
            return Number.isInteger(value) && value >= 0 && value < level.colors ? value : null;
          });
          clean.solved[idx] = Boolean(rawProgress.solved?.[idx]);
          const result = evaluateLevel(level, clean.fills[idx]);
          clean.solved[idx] = result.passed;
        });
        return clean;
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEYS.playData, JSON.stringify(compactData(state.playData)));
        localStorage.setItem(STORAGE_KEYS.playProgress, JSON.stringify(state.playProgress));
        localStorage.setItem(STORAGE_KEYS.editorData, JSON.stringify(compactData(state.editorData)));
      }

      function loadState() {
        const fallback = sampleData();
        try {
          const playDataRaw = localStorage.getItem(STORAGE_KEYS.playData);
          const playData = playDataRaw ? normalizeData(JSON.parse(playDataRaw)) : deepClone(fallback);
          state.playData = playData;
        } catch {
          state.playData = deepClone(fallback);
        }

        try {
          const progressRaw = localStorage.getItem(STORAGE_KEYS.playProgress);
          const parsed = progressRaw ? JSON.parse(progressRaw) : null;
          state.playProgress = normalizeProgress(state.playData, parsed);
        } catch {
          state.playProgress = makeProgress(state.playData);
        }

        try {
          const editorRaw = localStorage.getItem(STORAGE_KEYS.editorData);
          state.editorData = editorRaw ? normalizeData(JSON.parse(editorRaw)) : deepClone(state.playData);
        } catch {
          state.editorData = deepClone(state.playData);
        }
        ensureEditorSelection();
      }

      function getUnlockedCount() {
        if (state.playData.kind === "single") return 1;
        if (state.playData.unlockMode === "all") return state.playData.levels.length;
        if (state.playData.unlockMode === "dependency") {
          return state.playData.levels.filter((_, idx) => isLevelUnlocked(idx)).length;
        }
        const solvedCount = state.playProgress.solved.filter(Boolean).length;
        return Math.min(state.playData.levels.length, state.playData.visibleCount + solvedCount);
      }

      function isLevelUnlocked(index) {
        if (state.playData.kind === "single") return index === 0;
        if (state.playData.unlockMode === "all") return true;
        if (state.playData.unlockMode !== "dependency") {
          const solvedCount = state.playProgress.solved.filter(Boolean).length;
          return index < Math.min(state.playData.levels.length, state.playData.visibleCount + solvedCount);
        }
        const level = state.playData.levels[index];
        const deps = normalizeDependencies(level.deps, index, state.playData.levels.length);
        if (deps.length === 0) return true;
        return level.depMode === "any"
          ? deps.some((depIdx) => state.playProgress.solved[depIdx])
          : deps.every((depIdx) => state.playProgress.solved[depIdx]);
      }

      function getLevelHoverTitle(index) {
        const level = state.playData.levels[index];
        const title = `${index + 1}. ${level?.name || "未命名关卡"}`;
        const deps = normalizeDependencies(level.deps, index, state.playData.levels.length);
        if (state.playData.unlockMode === "all") {
          return `${title}\n解锁方式：完全解锁`;
        }
        if (state.playData.unlockMode === "progressive") {
          return `${title}\n解锁方式：顺序解锁`;
        }
        if (deps.length === 0) {
          return `${title}\n依赖方式：无依赖`;
        }
        const modeText = level.depMode === "any" ? "任意" : "全部";
        const detail = deps.map((depIdx) => {
          const dep = state.playData.levels[depIdx];
          return `${depIdx + 1}. ${dep?.name || "未命名关卡"}`;
        }).join("\n");
        return `${title}\n依赖方式：${modeText}\n依赖关卡：\n${detail}`;
      }

      function currentPlayLevel() {
        return getLevels(state.playData)[state.currentPlayIndex];
      }

      function getCellFillColor(colorIdx) {
        return COLOR_POOL[colorIdx % COLOR_POOL.length];
      }

      function createSymmetryIcon(type, className = "clue-icon") {
        const markup = ICON_SVG[type];
        if (!markup) return null;
        const holder = document.createElement("span");
        holder.className = className;
        holder.innerHTML = markup;
        return holder;
      }

      function createClueVisual(clue, className = "clue") {
        const holder = document.createElement("span");
        holder.className = className;
        holder.appendChild(createSymmetryIcon(clue.s || "N"));
        const num = document.createElement("span");
        num.className = "clue-number";
        num.textContent = formatClueNumber(clue.n);
        holder.appendChild(num);
        return holder;
      }

      function renderLegend() {
        const items = [
          { type: "", text: SYMMETRY_META[""].legend },
          { type: "H", text: SYMMETRY_META.H.legend },
          { type: "V", text: SYMMETRY_META.V.legend },
          { type: "B", text: SYMMETRY_META.B.legend },
          { type: "D1", text: SYMMETRY_META.D1.legend },
          { type: "D2", text: SYMMETRY_META.D2.legend },
          { type: "C", text: SYMMETRY_META.C.legend },
          { type: "R", text: SYMMETRY_META.R.legend }
        ];

        el.legend.replaceChildren();
        items.forEach((item) => {
          const node = document.createElement("span");
          node.className = "legend-item";
          node.appendChild(createSymmetryIcon(item.type || "N", "legend-symbol"));
          const text = document.createElement("span");
          text.textContent = item.text;
          node.appendChild(text);
          el.legend.appendChild(node);
        });
      }

      function cluePickerItems() {
        return [
          { type: "__hole__", text: "纯黑", icon: "X", title: "设置或取消镂空格" },
          { type: "", text: "纯数字", icon: "N" },
          { type: "H", text: "水平", icon: "H" },
          { type: "V", text: "竖直", icon: "V" },
          { type: "B", text: "双轴", icon: "B" },
          { type: "D1", text: "左斜", icon: "D1" },
          { type: "D2", text: "右斜", icon: "D2" },
          { type: "C", text: "中心", icon: "C" },
          { type: "R", text: "旋转", icon: "R" }
        ];
      }

      function renderCluePicker() {
        el.cluePicker.replaceChildren();
        cluePickerItems().forEach((item) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "clue-picker-btn" + (state.editorPickerMode === item.type ? " active" : "");
          btn.title = item.title || (item.type ? SYMMETRY_META[item.type].name : SYMMETRY_META[""].name);
          btn.appendChild(createSymmetryIcon(item.icon, "legend-symbol"));
          const text = document.createElement("span");
          text.className = "clue-picker-text";
          text.textContent = item.text;
          btn.appendChild(text);
          btn.addEventListener("click", () => {
            state.editorPickerMode = item.type;
            renderCluePicker();
          });
          el.cluePicker.appendChild(btn);
        });
      }

      function getClueLabel(clue) {
        const prefix = clue.p && clue.p !== "C" ? `${CLUE_POSITION_NAMES[clue.p]} ` : "";
        const number = formatClueNumber(clue.n);
        return prefix + (clue.s ? `${number}（${SYMMETRY_META[clue.s].name}）` : number);
      }

      function formatClueNumber(value) {
        return Number(value) === 0 ? "?" : String(value);
      }

      function findClue(level, p, r, c) {
        return level.clues.find((clue) => (clue.p || "C") === p && clue.r === r && clue.c === c) || null;
      }

      function setOrReplaceClue(level, clue) {
        const p = clue.p || "C";
        level.clues = level.clues.filter((item) => !((item.p || "C") === p && item.r === clue.r && item.c === clue.c));
        level.clues.push(clue);
        level.clues.sort((a, b) => ((a.p || "C").localeCompare(b.p || "C")) || (a.r - b.r) || (a.c - b.c));
      }

      function removeClue(level, p, r, c) {
        level.clues = level.clues.filter((item) => !((item.p || "C") === p && item.r === r && item.c === c));
      }

      function resizeLevel(level, newRows, newCols) {
        const rows = clampInt(newRows, 1, 30, level.rows);
        const cols = clampInt(newCols, 1, 30, level.cols);
        const newHoles = Array(rows * cols).fill(".");
        for (let r = 0; r < Math.min(rows, level.rows); r += 1) {
          for (let c = 0; c < Math.min(cols, level.cols); c += 1) {
            newHoles[r * cols + c] = level.holes[r * level.cols + c];
          }
        }
        level.rows = rows;
        level.cols = cols;
        level.holes = newHoles.join("");
        level.clues = level.clues.filter((clue) => isCluePlacementValid(level, clue));
      }

      function renderBoard(level, fills, handlers, wrap, mode = "play") {
        const board = document.createElement("div");
        board.className = "board";
        board.style.gridTemplateColumns = `repeat(${level.cols}, var(--cell-size))`;
        board.addEventListener("contextmenu", (event) => event.preventDefault());

        for (let r = 0; r < level.rows; r += 1) {
          for (let c = 0; c < level.cols; c += 1) {
            const idx = r * level.cols + c;
            const cell = document.createElement("button");
            cell.type = "button";
            cell.className = "cell";
            cell.dataset.top = r === 0 ? "1" : "0";
            cell.dataset.left = c === 0 ? "1" : "0";
            cell.dataset.index = String(idx);

            const isHole = level.holes[idx] === "#";
            if (isHole) {
              cell.classList.add("hole");
            } else if (fills && Number.isInteger(fills[idx])) {
              const color = getCellFillColor(fills[idx]);
              cell.style.background = color;
            }

            const clue = findClue(level, "C", r, c);
            if (clue) {
              cell.appendChild(createClueVisual(clue));
            }

            if (mode === "editor") {
              cell.addEventListener("click", () => handlers.onEditorAnchor("C", r, c, idx));
            } else if (!isHole) {
              cell.addEventListener("pointerdown", (event) => {
                handlers.onPointerDown(idx, event);
              });
              cell.addEventListener("pointerenter", () => {
                handlers.onPointerEnter(idx);
              });
              cell.addEventListener("click", () => handlers.onClick(idx, 1));
              cell.addEventListener("contextmenu", (event) => {
                event.preventDefault();
                handlers.onClick(idx, -1);
              });
            }

            board.appendChild(cell);
          }
        }

        level.clues.forEach((clue) => {
          const p = clue.p || "C";
          if (p === "C") return;
          const marker = createClueVisual(clue, "clue clue-floating");
          const { left, top } = getAnchorPosition(clue);
          marker.style.left = left;
          marker.style.top = top;
          board.appendChild(marker);
        });

        if (mode === "editor") {
          for (let r = 1; r < level.rows; r += 1) {
            for (let c = 0; c < level.cols; c += 1) {
              if (!isCluePlacementValid(level, { p: "H", r, c })) continue;
              board.appendChild(createAnchorHit(level, "H", r, c, handlers));
            }
          }
          for (let r = 0; r < level.rows; r += 1) {
            for (let c = 1; c < level.cols; c += 1) {
              if (!isCluePlacementValid(level, { p: "V", r, c })) continue;
              board.appendChild(createAnchorHit(level, "V", r, c, handlers));
            }
          }
          for (let r = 1; r < level.rows; r += 1) {
            for (let c = 1; c < level.cols; c += 1) {
              if (!isCluePlacementValid(level, { p: "X", r, c })) continue;
              board.appendChild(createAnchorHit(level, "X", r, c, handlers));
            }
          }
        }

        wrap.replaceChildren(board);
      }

      function getAnchorPosition(clue) {
        const p = clue.p || "C";
        if (p === "H") {
          return {
            left: `calc(${clue.c + 0.5} * var(--cell-size))`,
            top: `calc(${clue.r} * var(--cell-size))`
          };
        }
        if (p === "V") {
          return {
            left: `calc(${clue.c} * var(--cell-size))`,
            top: `calc(${clue.r + 0.5} * var(--cell-size))`
          };
        }
        return {
          left: `calc(${clue.c} * var(--cell-size))`,
          top: `calc(${clue.r} * var(--cell-size))`
        };
      }

      function createAnchorHit(level, p, r, c, handlers) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "anchor-hit " + (p === "H" ? "edge-h" : p === "V" ? "edge-v" : "vertex");
        const { left, top } = getAnchorPosition({ p, r, c });
        btn.style.left = left;
        btn.style.top = top;
        btn.addEventListener("click", () => handlers.onEditorAnchor(p, r, c, -1));
        return btn;
      }

      function renderPalette(container, count) {
        container.replaceChildren();
        for (let i = 0; i < count; i += 1) {
          const swatch = document.createElement("div");
          swatch.className = "swatch";
          swatch.title = "颜色 " + (i + 1);
          swatch.style.background = getCellFillColor(i);
          container.appendChild(swatch);
        }
      }

      function connectedComponents(level, fills) {
        const visited = Array(level.rows * level.cols).fill(false);
        const components = [];
        const indexToComponent = Array(level.rows * level.cols).fill(-1);
        const dirs = [[1,0], [-1,0], [0,1], [0,-1]];

        for (let r = 0; r < level.rows; r += 1) {
          for (let c = 0; c < level.cols; c += 1) {
            const idx = r * level.cols + c;
            if (visited[idx]) continue;
            if (level.holes[idx] === "#") {
              visited[idx] = true;
              continue;
            }
            const color = fills[idx];
            if (!Number.isInteger(color)) continue;
            visited[idx] = true;
            const queue = [[r, c]];
            const cells = [];
            while (queue.length) {
              const [cr, cc] = queue.shift();
              const cidx = cr * level.cols + cc;
              cells.push({ r: cr, c: cc, idx: cidx });
              indexToComponent[cidx] = components.length;
              dirs.forEach(([dr, dc]) => {
                let nr = cr + dr;
                let nc = cc + dc;
                if (level.wrapCols) {
                  nr = (nr + level.rows) % level.rows;
                }
                if (level.wrapRows) {
                  nc = (nc + level.cols) % level.cols;
                }
                if (nr < 0 || nr >= level.rows || nc < 0 || nc >= level.cols) return;
                const nidx = nr * level.cols + nc;
                if (visited[nidx]) return;
                if (level.holes[nidx] === "#") return;
                if (fills[nidx] !== color) return;
                visited[nidx] = true;
                queue.push([nr, nc]);
              });
            }
            components.push({ color, cells });
          }
        }

        components.forEach((component) => {
          component.size = component.cells.length;
          component.clues = [];
        });
        return { components, indexToComponent };
      }

      function positiveMod(value, mod) {
        return ((value % mod) + mod) % mod;
      }

      function componentPointSet(component, level) {
        const periodX = level.cols * 2;
        const periodY = level.rows * 2;
        const wrapX = Boolean(level.wrapRows);
        const wrapY = Boolean(level.wrapCols);
        const normalizePoint = (x, y) => ({
          x: wrapX ? positiveMod(x, periodX) : x,
          y: wrapY ? positiveMod(y, periodY) : y
        });
        const points = component.cells.map((cell) => ({
          x: 2 * cell.c + 1,
          y: 2 * cell.r + 1
        }));
        const normalizedPoints = points.map((p) => normalizePoint(p.x, p.y));
        return {
          points: normalizedPoints,
          set: new Set(normalizedPoints.map((p) => p.x + "," + p.y)),
          wrapX,
          wrapY,
          periodX,
          periodY,
          normalizePoint
        };
      }

      function evenConstants(period) {
        const constants = [];
        for (let value = 0; value < period; value += 2) constants.push(value);
        return constants;
      }

      function pointBounds(points) {
        const xs = points.map((p) => p.x);
        const ys = points.map((p) => p.y);
        return {
          minX: Math.min(...xs),
          maxX: Math.max(...xs),
          minY: Math.min(...ys),
          maxY: Math.max(...ys)
        };
      }

      function everyMappedPoint(ctx, mapper) {
        return ctx.points.every((p) => {
          const mapped = mapper(p);
          if (!Number.isInteger(mapped.x) || !Number.isInteger(mapped.y)) return false;
          const normalized = ctx.normalizePoint(mapped.x, mapped.y);
          return ctx.set.has(normalized.x + "," + normalized.y);
        });
      }

      function reflectHorizontal(level, component) {
        const ctx = componentPointSet(component, level);
        const { points } = ctx;
        const ys = points.map((p) => p.y);
        const constants = ctx.wrapY ? evenConstants(ctx.periodY) : [Math.min(...ys) + Math.max(...ys)];
        return constants.some((sy) => everyMappedPoint(ctx, (p) => ({ x: p.x, y: sy - p.y })));
      }

      function reflectVertical(level, component) {
        const ctx = componentPointSet(component, level);
        const { points } = ctx;
        const xs = points.map((p) => p.x);
        const constants = ctx.wrapX ? evenConstants(ctx.periodX) : [Math.min(...xs) + Math.max(...xs)];
        return constants.some((sx) => everyMappedPoint(ctx, (p) => ({ x: sx - p.x, y: p.y })));
      }

      function reflectDiagonalBackslash(level, component) {
        const ctx = componentPointSet(component, level);
        const { points } = ctx;
        const vs = points.map((p) => p.y - p.x);
        const canUseTorus = ctx.wrapX && ctx.wrapY && level.cols === level.rows;
        const constants = canUseTorus ? evenConstants(ctx.periodX) : [Math.min(...vs) + Math.max(...vs)];
        return constants.some((sv) => everyMappedPoint(ctx, (p) => {
          const u = p.x + p.y;
          const v2 = sv - (p.y - p.x);
          return {
            x: (u - v2) / 2,
            y: (u + v2) / 2
          };
        }));
      }

      function reflectDiagonalSlash(level, component) {
        const ctx = componentPointSet(component, level);
        const { points } = ctx;
        const us = points.map((p) => p.x + p.y);
        const canUseTorus = ctx.wrapX && ctx.wrapY && level.cols === level.rows;
        const constants = canUseTorus ? evenConstants(ctx.periodX) : [Math.min(...us) + Math.max(...us)];
        return constants.some((su) => everyMappedPoint(ctx, (p) => {
          const v = p.y - p.x;
          const u2 = su - (p.x + p.y);
          return {
            x: (u2 - v) / 2,
            y: (u2 + v) / 2
          };
        }));
      }

      function rotateHalf(level, component) {
        const ctx = componentPointSet(component, level);
        const { minX, maxX, minY, maxY } = pointBounds(ctx.points);
        const xConstants = ctx.wrapX ? evenConstants(ctx.periodX) : [minX + maxX];
        const yConstants = ctx.wrapY ? evenConstants(ctx.periodY) : [minY + maxY];
        return xConstants.some((sx) => yConstants.some((sy) => {
          return everyMappedPoint(ctx, (p) => ({ x: sx - p.x, y: sy - p.y }));
        }));
      }

      function rotateQuarter(level, component) {
        const ctx = componentPointSet(component, level);
        const canUseTorus = ctx.wrapX && ctx.wrapY && level.cols === level.rows;
        const { minX, maxX, minY, maxY } = pointBounds(ctx.points);
        const xConstants = canUseTorus ? evenConstants(ctx.periodX) : [minX + maxX];
        const yConstants = canUseTorus ? evenConstants(ctx.periodY) : [minY + maxY];
        return xConstants.some((sx) => yConstants.some((sy) => {
          return everyMappedPoint(ctx, (p) => ({
            x: (sx + sy) / 2 - p.y,
            y: (sy - sx) / 2 + p.x
          }));
        }));
      }

      function checkSymmetry(level, component, type) {
        switch (type) {
          case "":
            return true;
          case "H":
            return reflectHorizontal(level, component);
          case "V":
            return reflectVertical(level, component);
          case "B":
            return reflectHorizontal(level, component) && reflectVertical(level, component);
          case "D1":
            return reflectDiagonalBackslash(level, component);
          case "D2":
            return reflectDiagonalSlash(level, component);
          case "C":
            return rotateHalf(level, component);
          case "R":
            return rotateQuarter(level, component);
          default:
            return true;
        }
      }

      function evaluateLevel(level, fills) {
        const totalPlayable = level.rows * level.cols - [...level.holes].filter((ch) => ch === "#").length;
        let filledCount = 0;
        for (let idx = 0; idx < level.rows * level.cols; idx += 1) {
          if (level.holes[idx] === "#") continue;
          if (Number.isInteger(fills[idx])) {
            filledCount += 1;
          }
        }
        if (filledCount < totalPlayable) {
          return {
            passed: false,
            incomplete: true,
            message: `还有 ${totalPlayable - filledCount} 个格子未涂色。`
          };
        }

        const { components, indexToComponent } = connectedComponents(level, fills);
        for (const clue of level.clues) {
          const touched = getClueTouchedCells(level, clue);
          const colors = touched.map((cell) => fills[cell.r * level.cols + cell.c]);
          if (colors.some((color) => color !== colors[0])) {
            return {
              passed: false,
              incomplete: false,
              message: `提示 ${getClueLabel(clue)} 接触的格子必须同色。`
            };
          }
          const componentIds = touched.map((cell) => indexToComponent[cell.r * level.cols + cell.c]);
          if (componentIds.some((id) => id !== componentIds[0] || id < 0)) {
            return {
              passed: false,
              incomplete: false,
              message: `提示 ${getClueLabel(clue)} 接触的格子必须属于同一连通块。`
            };
          }
          components[componentIds[0]].clues.push(clue);
        }
        for (const component of components) {
          if (level.singleClue && component.clues.length > 1) {
            return {
              passed: false,
              incomplete: false,
              message: `存在一个大小为 ${component.size} 的同色连通块包含多个提示数。`
            };
          }
          for (const clue of component.clues) {
            if (clue.n > 0 && component.size !== clue.n) {
              return {
                passed: false,
                incomplete: false,
                message: `提示 ${getClueLabel(clue)} 所在连通块大小为 ${component.size}，与要求不符。`
              };
            }
            if (!checkSymmetry(level, component, clue.s)) {
              return {
                passed: false,
                incomplete: false,
                message: `提示 ${getClueLabel(clue)} 所在连通块不满足对应对称条件。`
              };
            }
          }
        }

        return {
          passed: true,
          incomplete: false,
          message: "判定通过。"
        };
      }

      function setPlayData(data) {
        state.playData = deepClone(data);
        state.playProgress = makeProgress(state.playData);
        state.currentPlayIndex = 0;
        saveState();
        renderAll();
      }

      function setActiveTab(tab) {
        state.activeTab = tab === "setter" ? "setter" : "player";
        const isPlayer = state.activeTab === "player";
        el.playerTabBtn.classList.toggle("active", isPlayer);
        el.setterTabBtn.classList.toggle("active", !isPlayer);
        el.playerPanel.classList.toggle("active", isPlayer);
        el.setterPanel.classList.toggle("active", !isPlayer);
        el.playerTabBtn.setAttribute("aria-selected", String(isPlayer));
        el.setterTabBtn.setAttribute("aria-selected", String(!isPlayer));
      }

      function getCurrentFills() {
        return state.playProgress.fills[state.currentPlayIndex];
      }

      function getCurrentPlayEvaluation() {
        const level = currentPlayLevel();
        const fills = getCurrentFills();
        const result = evaluateLevel(level, fills);
        state.playProgress.solved[state.currentPlayIndex] = result.passed;
        return { level, fills, result };
      }

      function updatePlayInfo(level, result) {
        if (state.playData.kind === "single") {
          el.playMeta.textContent = `${level.name} · ${level.rows}×${level.cols} · 可用颜色 ${level.colors} 种`;
        } else {
          const solvedCount = state.playProgress.solved.filter(Boolean).length;
          const modeText = state.playData.unlockMode === "all"
            ? "完全解锁"
            : state.playData.unlockMode === "dependency"
              ? `依赖模式，当前解锁 ${getUnlockedCount()} / ${state.playData.levels.length}`
              : `顺序解锁，当前可见 ${getUnlockedCount()} / ${state.playData.levels.length}`;
          el.playMeta.textContent = `${state.playData.name} · 第 ${state.currentPlayIndex + 1} 题 / ${state.playData.levels.length} · 已通过 ${solvedCount} 题 · ${modeText}`;
        }

        const navigator = document.createElement("div");
        navigator.className = "stack";
        if (state.playData.kind === "collection") {
          const chips = document.createElement("div");
          chips.className = "level-list";
          const groups = [];
          const groupMap = new Map();
          state.playData.levels.forEach((item, idx) => {
            const sectionName = item.section?.trim() || "默认";
            if (!groupMap.has(sectionName)) {
              const group = { name: sectionName, items: [] };
              groupMap.set(sectionName, group);
              groups.push(group);
            }
            groupMap.get(sectionName).items.push({ item, idx });
          });
          groups.forEach((group) => {
            const row = document.createElement("div");
            row.className = "level-section";
            const name = document.createElement("div");
            name.className = "level-section-name";
            name.textContent = group.name;
            const chipWrap = document.createElement("div");
            chipWrap.className = "level-section-chips";
            group.items.forEach(({ item, idx }, localIdx) => {
              const chip = document.createElement("button");
              chip.type = "button";
              chip.className = "level-chip";
              const unlocked = isLevelUnlocked(idx);
              if (idx === state.currentPlayIndex) chip.classList.add("active");
              if (!unlocked) chip.classList.add("locked");
              if (state.playProgress.solved[idx]) chip.classList.add("solved");
              chip.textContent = unlocked ? String(localIdx + 1) : "🔒" + (localIdx + 1);
              chip.title = getLevelHoverTitle(idx);
              chip.setAttribute("aria-disabled", unlocked ? "false" : "true");
              chip.addEventListener("click", () => {
                if (!unlocked) return;
                state.currentPlayIndex = idx;
                renderPlay();
              });
              chipWrap.appendChild(chip);
            });
            row.append(name, chipWrap);
            chips.appendChild(row);
          });
          const currentName = document.createElement("div");
          currentName.className = "meta";
          currentName.textContent = `当前题目：${level.section?.trim() ? level.section + " · " : ""}${level.name}`;
          navigator.append(chips, currentName);
        } else {
          navigator.textContent = level.name;
        }
        el.playNavigator.replaceChildren(navigator);

        el.playStatus.className = "status" + (result.passed ? " good" : "");
        let statusText = "";
        if (result.passed) {
          statusText = result.message;
          if (state.playData.kind === "collection" && state.currentPlayIndex + 1 < state.playData.levels.length && isLevelUnlocked(state.currentPlayIndex + 1)) {
            statusText += " 可以查看下一题。";
          }
        }
        el.playStatus.textContent = statusText;

        el.prevLevelBtn.disabled = state.currentPlayIndex <= 0;
        el.nextLevelBtn.disabled = state.playData.kind === "single"
          ? true
          : state.currentPlayIndex >= state.playData.levels.length - 1 || !isLevelUnlocked(state.currentPlayIndex + 1);
      }

      function updatePlayCellVisual(idx) {
        const fills = getCurrentFills();
        const cell = el.playBoardWrap.querySelector(`.cell[data-index="${idx}"]`);
        if (!cell) return;
        cell.style.background = "";
        if (Number.isInteger(fills[idx])) {
          cell.style.background = getCellFillColor(fills[idx]);
        }
      }

      function beginPlayDrag(idx, event) {
        if (event.button !== 0) return;
        const level = currentPlayLevel();
        const fills = getCurrentFills();
        if (level.holes[idx] === "#") return;
        state.playDrag.active = true;
        state.playDrag.color = fills[idx] ?? null;
        state.playDrag.moved = false;
        state.playDrag.justDragged = false;
      }

      function continuePlayDrag(idx) {
        if (!state.playDrag.active) return;
        const level = currentPlayLevel();
        const fills = getCurrentFills();
        if (level.holes[idx] === "#") return;
        if (fills[idx] === state.playDrag.color) return;
        fills[idx] = state.playDrag.color;
        state.playDrag.moved = true;
        updatePlayCellVisual(idx);
        const { result } = getCurrentPlayEvaluation();
        saveState();
        updatePlayInfo(level, result);
      }

      function handlePlayPointerMove(event) {
        if (!state.playDrag.active) return;
        const target = document.elementFromPoint(event.clientX, event.clientY);
        const cell = target?.closest?.(".cell[data-index]");
        if (!cell || !el.playBoardWrap.contains(cell)) return;
        continuePlayDrag(Number(cell.dataset.index));
      }

      function finishPlayDrag() {
        if (!state.playDrag.active) return;
        state.playDrag.justDragged = state.playDrag.moved;
        state.playDrag.active = false;
        state.playDrag.color = null;
        state.playDrag.moved = false;
      }

      function handlePlayCell(idx, dir) {
        if (state.playDrag.justDragged) {
          state.playDrag.justDragged = false;
          return;
        }
        const level = currentPlayLevel();
        const fills = getCurrentFills();
        if (level.holes[idx] === "#") return;
        const max = level.colors;
        const current = fills[idx];
        if (current === null || current === undefined) {
          fills[idx] = dir > 0 ? 0 : max - 1;
        } else {
          const next = current + dir;
          if (next < 0 || next >= max) {
            fills[idx] = null;
          } else {
            fills[idx] = next;
          }
        }
        const result = evaluateLevel(level, fills);
        state.playProgress.solved[state.currentPlayIndex] = result.passed;
        saveState();
        renderPlay();
      }

      function resetCurrentLevel() {
        const level = currentPlayLevel();
        state.playProgress.fills[state.currentPlayIndex] = Array(level.rows * level.cols).fill(null);
        state.playProgress.solved[state.currentPlayIndex] = false;
        saveState();
        renderPlay();
      }

      function renderPlay() {
        const { level, fills, result } = getCurrentPlayEvaluation();
        updatePlayInfo(level, result);
        renderBoard(level, fills, {
          onClick: handlePlayCell,
          onPointerDown: beginPlayDrag,
          onPointerEnter: continuePlayDrag
        }, el.playBoardWrap, "play");
        renderPalette(el.playPalette, level.colors);
      }

      function handleEditorCell(p, r, c) {
        const level = getActiveEditorLevel();
        const idx = p === "C" ? r * level.cols + c : -1;
        const mode = state.editorPickerMode;
        if (mode === "__hole__") {
          if (p !== "C") return;
          const chars = [...level.holes];
          chars[idx] = chars[idx] === "#" ? "." : "#";
          level.holes = chars.join("");
          if (chars[idx] === "#") {
            level.clues = level.clues.filter((clue) => !getClueTouchedCells(level, clue).some((cell) => cell.r === r && cell.c === c));
          }
          level.clues = level.clues.filter((clue) => isCluePlacementValid(level, clue));
        } else {
          if (p === "C" && level.holes[idx] === "#") {
            const chars = [...level.holes];
            chars[idx] = ".";
            level.holes = chars.join("");
          }
          if (!isCluePlacementValid(level, { p, r, c })) return;
          const n = clampInt(el.clueNumberInput.value, 0, 999, 1);
          const s = normalizeSymmetry(mode);
          const currentClue = findClue(level, p, r, c);
          if (currentClue && currentClue.n === n && currentClue.s === s) {
            removeClue(level, p, r, c);
          } else {
            setOrReplaceClue(level, { p, r, c, n, s });
          }
        }
        saveState();
        renderEditor();
      }

      function renderEditorLevelList() {
        el.editorLevelList.replaceChildren();
        if (state.editorData.kind === "single") {
          el.editorCollectionTools.style.display = "none";
          return;
        }
        el.editorCollectionTools.style.display = "grid";
        state.editorData.levels.forEach((level, idx) => {
          const item = document.createElement("button");
          item.type = "button";
          item.className = "list-item" + (idx === state.editorSelection ? " active" : "");
          const section = level.section?.trim() ? `${escapeHtml(level.section)} · ` : "";
          const deps = (level.deps || []).length ? `依赖 ${(level.deps || []).map((dep) => dep + 1).join(",")}` : "无依赖";
          item.innerHTML = `<span>${idx + 1}. ${section}${escapeHtml(level.name)}</span><span>${deps} · ${level.rows}×${level.cols}</span>`;
          item.addEventListener("click", () => {
            state.editorSelection = idx;
            renderEditor();
          });
          el.editorLevelList.appendChild(item);
        });
      }

      function escapeHtml(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function renderEditor() {
        ensureEditorSelection();
        const level = getActiveEditorLevel();
        const kindText = state.editorData.kind === "single" ? "当前正在编辑：单题" : `当前正在编辑：题集（共 ${state.editorData.levels.length} 题）`;
        el.editorModeMeta.textContent = kindText;
        el.editorNameInput.value = state.editorData.kind === "single" ? level.name : state.editorData.name;
        el.collectionModeSelect.value = state.editorData.kind === "collection" ? state.editorData.unlockMode : "all";
        el.visibleCountInput.value = state.editorData.kind === "collection" ? String(state.editorData.visibleCount) : "2";
        el.collectionModeSelect.disabled = state.editorData.kind !== "collection";
        el.visibleCountInput.disabled = state.editorData.kind !== "collection" || state.editorData.unlockMode !== "progressive";
        el.collectionModeField.classList.toggle("hidden", state.editorData.kind !== "collection");
        el.visibleCountField.classList.toggle(
          "hidden",
          state.editorData.kind !== "collection" || state.editorData.unlockMode !== "progressive"
        );
        el.dependencyFields.classList.toggle(
          "hidden",
          state.editorData.kind !== "collection" || state.editorData.unlockMode !== "dependency"
        );

        el.levelNameInput.value = level.name;
        el.sectionNameInput.value = level.section || "";
        el.dependencyInput.value = (level.deps || []).map((idx) => idx + 1).join(",");
        el.dependencyModeSelect.value = level.depMode === "any" ? "any" : "all";
        el.rowsInput.value = String(level.rows);
        el.colsInput.value = String(level.cols);
        el.colorsInput.value = String(level.colors);
        el.singleClueCheckbox.checked = level.singleClue;
        el.wrapRowsCheckbox.checked = Boolean(level.wrapRows);
        el.wrapColsCheckbox.checked = Boolean(level.wrapCols);

        renderCluePicker();
        renderEditorLevelList();
        renderBoard(level, null, {
          onEditorAnchor: handleEditorCell
        }, el.editorBoardWrap, "editor");
      }

      function updateEditorMetaFields() {
        if (state.editorData.kind === "single") {
          getActiveEditorLevel().name = el.editorNameInput.value.trim() || "未命名单题";
        } else {
          state.editorData.name = el.editorNameInput.value.trim() || "未命名题集";
          state.editorData.unlockMode = normalizeUnlockMode(el.collectionModeSelect.value);
          state.editorData.visibleCount = clampInt(el.visibleCountInput.value, 1, 99, 2);
        }
        saveState();
        renderEditor();
      }

      function updateEditorLevelFields() {
        const level = getActiveEditorLevel();
        level.name = el.levelNameInput.value.trim() || "未命名关卡";
        level.section = el.sectionNameInput.value.trim();
        if (state.editorData.kind === "collection") {
          level.deps = normalizeDependencies(el.dependencyInput.value, state.editorSelection, state.editorData.levels.length);
          level.depMode = normalizeDependencyMode(el.dependencyModeSelect.value);
        } else {
          level.deps = [];
          level.depMode = "all";
        }
        resizeLevel(level, el.rowsInput.value, el.colsInput.value);
        level.colors = clampInt(el.colorsInput.value, 1, 4, 2);
        level.singleClue = el.singleClueCheckbox.checked;
        level.wrapRows = el.wrapRowsCheckbox.checked;
        level.wrapCols = el.wrapColsCheckbox.checked;
        saveState();
        renderEditor();
      }

      function remapEditorDependencies(mapper) {
        if (state.editorData.kind !== "collection") return;
        const total = state.editorData.levels.length;
        state.editorData.levels.forEach((level, idx) => {
          const seen = new Set();
          level.deps = (level.deps || []).map(mapper).filter((depIdx) => {
            if (!Number.isInteger(depIdx) || depIdx < 0 || depIdx >= total || depIdx === idx) return false;
            if (seen.has(depIdx)) return false;
            seen.add(depIdx);
            return true;
          });
        });
      }

      function addLevel() {
        if (state.editorData.kind !== "collection") return;
        const next = makeLevel(`关卡 ${state.editorData.levels.length + 1}`);
        state.editorData.levels.push(next);
        state.editorSelection = state.editorData.levels.length - 1;
        saveState();
        renderEditor();
      }

      function duplicateLevel() {
        if (state.editorData.kind !== "collection") {
          state.editorData = makeSingle(deepClone(getActiveEditorLevel()));
          saveState();
          renderEditor();
          return;
        }
        const clone = deepClone(getActiveEditorLevel());
        clone.name = clone.name + " 副本";
        state.editorData.levels.splice(state.editorSelection + 1, 0, clone);
        state.editorSelection += 1;
        remapEditorDependencies((depIdx) => depIdx >= state.editorSelection ? depIdx + 1 : depIdx);
        saveState();
        renderEditor();
      }

      function moveLevel(dir) {
        if (state.editorData.kind !== "collection") return;
        const from = state.editorSelection;
        const to = from + dir;
        if (to < 0 || to >= state.editorData.levels.length) return;
        const order = state.editorData.levels.map((_, idx) => idx);
        const [oldIndex] = order.splice(from, 1);
        order.splice(to, 0, oldIndex);
        const oldToNew = [];
        order.forEach((oldIdx, newIdx) => {
          oldToNew[oldIdx] = newIdx;
        });
        const [item] = state.editorData.levels.splice(from, 1);
        state.editorData.levels.splice(to, 0, item);
        state.editorSelection = to;
        remapEditorDependencies((depIdx) => oldToNew[depIdx]);
        saveState();
        renderEditor();
      }

      function deleteLevel() {
        if (state.editorData.kind === "single") {
          state.editorData = makeSingle(makeLevel());
          state.editorSelection = 0;
        } else {
          if (state.editorData.levels.length <= 1) {
            state.editorData.levels[0] = makeLevel("关卡 1");
            state.editorSelection = 0;
          } else {
            const removedIndex = state.editorSelection;
            state.editorData.levels.splice(state.editorSelection, 1);
            remapEditorDependencies((depIdx) => depIdx > removedIndex ? depIdx - 1 : depIdx === removedIndex ? -1 : depIdx);
            state.editorSelection = Math.max(0, state.editorSelection - 1);
          }
        }
        saveState();
        renderEditor();
      }

      function refreshExportText(message = "导出文本已生成。") {
        try {
          el.exportText.value = exportDataText(state.editorData);
          el.exportStatus.textContent = `${message} 长度：${el.exportText.value.length} 字符。`;
        } catch (err) {
          el.exportStatus.textContent = err.message;
        }
      }

      async function copyText(text) {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(text);
          return;
        }
        const temp = document.createElement("textarea");
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        temp.remove();
      }

      function downloadExport() {
        const text = el.exportText.value.trim() || exportDataText(state.editorData);
        const blob = new Blob([text], { type: "application/json;charset=utf-8" });
        const a = document.createElement("a");
        const safeName = (state.editorData.kind === "single" ? getActiveEditorLevel().name : state.editorData.name || "ase-data")
          .replace(/[\\/:*?"<>|]+/g, "_");
        a.href = URL.createObjectURL(blob);
        a.download = `${safeName || "ase-data"}.ase.json`;
        a.click();
        URL.revokeObjectURL(a.href);
        el.exportStatus.textContent = "存档文件已开始下载。";
      }

      function importTextTo(target) {
        try {
          const data = parseDataText(el.importText.value);
          if (target === "play") {
            setPlayData(data);
            el.importStatus.textContent = "已导入到游玩区。";
            setActiveTab("player");
          } else {
            state.editorData = deepClone(data);
            state.editorSelection = 0;
            saveState();
            renderEditor();
            el.importStatus.textContent = "已导入到编辑区。";
            setActiveTab("setter");
          }
        } catch (err) {
          el.importStatus.textContent = err.message;
        }
      }

      function handleFileImport(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          const text = String(reader.result || "");
          el.importText.value = text;
          el.importStatus.textContent = `已读取文件：${file.name}`;
        };
        reader.onerror = () => {
          el.importStatus.textContent = "文件读取失败。";
        };
        reader.readAsText(file, "utf-8");
      }

      function renderAll() {
        renderPlay();
        renderEditor();
        refreshExportText("已刷新导出文本。");
        setActiveTab(state.activeTab);
      }

      function bindEvents() {
        el.playerTabBtn.addEventListener("click", () => setActiveTab("player"));
        el.setterTabBtn.addEventListener("click", () => setActiveTab("setter"));

        el.prevLevelBtn.addEventListener("click", () => {
          if (state.currentPlayIndex > 0) {
            state.currentPlayIndex -= 1;
            renderPlay();
          }
        });

        el.nextLevelBtn.addEventListener("click", () => {
          const target = state.currentPlayIndex + 1;
          if (state.playData.kind === "collection" && isLevelUnlocked(target)) {
            state.currentPlayIndex = target;
            renderPlay();
          }
        });

        el.resetLevelBtn.addEventListener("click", resetCurrentLevel);
        el.importToPlayBtn.addEventListener("click", () => importTextTo("play"));
        el.importToEditorBtn.addEventListener("click", () => importTextTo("editor"));
        el.importFileInput.addEventListener("change", (event) => handleFileImport(event.target.files?.[0]));

        el.newSingleBtn.addEventListener("click", () => {
          state.editorData = makeSingle(makeLevel());
          state.editorSelection = 0;
          saveState();
          renderEditor();
          refreshExportText("已新建单题并刷新导出文本。");
          setActiveTab("setter");
        });

        el.newCollectionBtn.addEventListener("click", () => {
          state.editorData = makeCollection();
          state.editorSelection = 0;
          saveState();
          renderEditor();
          refreshExportText("已新建题集并刷新导出文本。");
          setActiveTab("setter");
        });

        el.copyPlayToEditorBtn.addEventListener("click", () => {
          state.editorData = deepClone(state.playData);
          state.editorSelection = 0;
          saveState();
          renderEditor();
          refreshExportText("已从游玩区复制并刷新导出文本。");
          setActiveTab("setter");
        });

        el.loadSampleBtn.addEventListener("click", () => {
          state.editorData = sampleData();
          state.editorSelection = 0;
          saveState();
          renderEditor();
          refreshExportText("已载入示例并刷新导出文本。");
          setActiveTab("setter");
        });

        el.pushEditorToPlayBtn.addEventListener("click", () => {
          setPlayData(state.editorData);
          el.importStatus.textContent = "编辑器内容已发送到游玩区。";
          setActiveTab("player");
        });

        el.editorNameInput.addEventListener("input", updateEditorMetaFields);
        el.collectionModeSelect.addEventListener("change", updateEditorMetaFields);
        el.visibleCountInput.addEventListener("input", updateEditorMetaFields);
        el.levelNameInput.addEventListener("input", updateEditorLevelFields);
        el.sectionNameInput.addEventListener("input", updateEditorLevelFields);
        el.dependencyInput.addEventListener("input", updateEditorLevelFields);
        el.dependencyModeSelect.addEventListener("change", updateEditorLevelFields);
        el.rowsInput.addEventListener("input", updateEditorLevelFields);
        el.colsInput.addEventListener("input", updateEditorLevelFields);
        el.colorsInput.addEventListener("input", updateEditorLevelFields);
        el.singleClueCheckbox.addEventListener("change", updateEditorLevelFields);
        el.wrapRowsCheckbox.addEventListener("change", updateEditorLevelFields);
        el.wrapColsCheckbox.addEventListener("change", updateEditorLevelFields);
        window.addEventListener("pointerup", finishPlayDrag);
        window.addEventListener("pointercancel", finishPlayDrag);
        window.addEventListener("pointermove", handlePlayPointerMove);

        el.addLevelBtn.addEventListener("click", addLevel);
        el.duplicateLevelBtn.addEventListener("click", duplicateLevel);
        el.moveLevelUpBtn.addEventListener("click", () => moveLevel(-1));
        el.moveLevelDownBtn.addEventListener("click", () => moveLevel(1));
        el.deleteLevelBtn.addEventListener("click", deleteLevel);

        el.refreshExportBtn.addEventListener("click", () => refreshExportText("已刷新导出文本。"));
        el.copyExportBtn.addEventListener("click", async () => {
          try {
            if (!el.exportText.value.trim()) refreshExportText();
            await copyText(el.exportText.value);
            el.exportStatus.textContent = "导出文本已复制。";
          } catch {
            el.exportStatus.textContent = "复制失败，请手动复制。";
          }
        });
        el.downloadExportBtn.addEventListener("click", downloadExport);
      }

      loadState();
      bindEvents();
      renderLegend();
      renderAll();
    })();
  </script>
</body>
</html>
